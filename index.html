    .navbar {
        background: #007bff;
        color: white;
        padding: 15px 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 10;
    }

    .navbar a {
        color: white;
        margin-left: 20px;
        text-decoration: none;

        font-size: 16px;

    /* ----------- TARJETA DE BIENVENIDA ----------- */
    .welcome {
        max-width: 700px;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        text-align: center;
    }

    /* ----------- BOTONES ----------- */
    .btn {
        display: block;
        width: 300px;
        margin: 15px auto;
        padding: 15px;
        background-color: #007bff;
        color: white;
        font-size: 18px;
        border-radius: 8px;
        text-decoration: none;
        transition: 0.2s;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    .btn:hover {
        background-color: #0056b3;
        transform: translateY(-2px);
    }

    .icon {
        margin-right: 10px;
    }

    /* ----------- FOOTER ----------- */
    footer {
        margin-top: 500px;
        padding: 20px;
        background: #222;
        color: white;
        text-align: center;
        font-size: 14px;
    }

    /* ----------- MODO OSCURO ----------- */
    .dark-mode {
        background: #121212;
        color: #eee;
    }

    .dark-mode .navbar {
        background: #333;
    }

    .dark-mode .welcome {
        background: #1e1e1e;
        color: #eee;
    }

    .dark-mode .btn {
        background: #444;
    }

    .dark-mode .btn:hover {
        background: #666;
    }

    .dark-mode footer {
        background: #000;
    }

    .dark-toggle {
        cursor: pointer;
        padding: 6px 12px;
        background: white;
        color: #007bff;
        font-weight: bold;
        border-radius: 6px;
    }
</style>

</head>
<body>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const darkMode = localStorage.getItem("darkMode");

        if (darkMode === "enabled") {
            document.body.classList.add("dark-mode");
        }
    });

    // 2️⃣ Botón que activa/desactiva el modo oscuro
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");

        // 3️⃣ Guardar la preferencia en el navegador
        if (document.body.classList.contains("dark-mode")) {
            localStorage.setItem("darkMode", "enabled");
        } else {
            localStorage.setItem("darkMode", "disabled");
        }
    }
</script>
